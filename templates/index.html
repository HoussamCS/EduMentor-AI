<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMentor AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-light">
  <div class="container py-4" id="root">
    <!-- React app will render here -->
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js" crossorigin></script>

  <script type="text/babel">
    const { useState } = React;

    function Loader() {
      return (
        <div className="d-flex justify-content-center my-3">
          <div className="spinner-border text-primary" role="status">
            <span className="visually-hidden">Loading...</span>
          </div>
        </div>
      );
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      return res.json();
    }

    function ChatTab() {
      const [question, setQuestion] = useState("");
      const [answer, setAnswer] = useState("");
      const [sources, setSources] = useState([]);
      const [loading, setLoading] = useState(false);

      const send = async () => {
        if (!question.trim()) return;
        setLoading(true);
        try {
          const result = await postJson("/api/chat", { question });
          setAnswer(result.answer || result.error || "No response");
          setSources(result.sources || []);
        } catch (e) {
          setAnswer("Error: " + e.message);
          setSources([]);
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="mb-3">
            <label className="form-label">Ask a course question</label>
            <textarea
              value={question}
              onChange={(e) => setQuestion(e.target.value)}
              className="form-control"
              rows={3}
              placeholder="Explain gradient descent in simple terms"
            />
          </div>
          <button className="btn btn-primary" onClick={send} disabled={loading}>
            Ask
          </button>
          {loading && <Loader />}

          <div className="mt-4">
            <h5>Answer</h5>
            <pre className="result-box">{answer}</pre>
            <h6>Sources</h6>
            <ul>
              {sources.map((src, idx) => (
                <li key={idx}>{src}</li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    function ExerciseTab() {
      const [topic, setTopic] = useState("Python Basics");
      const [difficulty, setDifficulty] = useState("Beginner");
      const [result, setResult] = useState({});
      const [loading, setLoading] = useState(false);
      const [showDetails, setShowDetails] = useState(false);

      const generate = async () => {
        setLoading(true);
        try {
          const r = await postJson("/api/exercise", { topic, difficulty });
          const text = normalizeExerciseText(r.exercise || r.error || "No response");
          const sectionOrder = [
            "Problem",
            "Example Input",
            "Expected Output",
            "Hints",
            "Solution",
            "Example Usage",
          ];

          const extract = (name) =>
            extractSection(text, name, sectionOrder.filter((s) => s !== name));

          setResult({
            problem: extract("Problem") || text,
            exampleInput: extract("Example Input"),
            expectedOutput: extract("Expected Output"),
            hints: extract("Hints"),
            solution: extract("Solution"),
            exampleUsage: extract("Example Usage"),
          });
        } catch (e) {
          setResult({ problem: "Error: " + e.message });
        }
        setLoading(false);
        setShowDetails(false);
      };

      return (
        <div>
          <div className="row g-3">
            <div className="col-md-6">
              <label className="form-label">Topic</label>
              <input
                value={topic}
                onChange={(e) => setTopic(e.target.value)}
                className="form-control"
                placeholder="Python Functions"
              />
            </div>
            <div className="col-md-6">
              <label className="form-label">Difficulty</label>
              <select
                value={difficulty}
                onChange={(e) => setDifficulty(e.target.value)}
                className="form-select"
              >
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
              </select>
            </div>
          </div>
          <button
            className="btn btn-success mt-3"
            onClick={generate}
            disabled={loading}
          >
            Generate Exercise
          </button>
          {loading && <Loader />}

          {result.problem && (
            <div className="mt-4">
              <h5>Generated Exercise</h5>
              <div className="mb-3">
                <label className="form-label">Problem</label>
                <pre className="result-box">{result.problem}</pre>
              </div>
              <div className="mb-3">
                <label className="form-label">Example Input</label>
                <pre className="result-box">
                  {result.exampleInput || "No example input provided."}
                </pre>
              </div>
              <div className="mb-3">
                <label className="form-label">Expected Output</label>
                <pre className="result-box">
                  {result.expectedOutput || "No expected output provided."}
                </pre>
              </div>
              <button
                className="btn btn-outline-secondary btn-sm"
                onClick={() => setShowDetails(!showDetails)}
              >
                {showDetails
                  ? "Hide Hints / Solution / Example Usage"
                  : "Show Hints / Solution / Example Usage"}
              </button>
              {showDetails && (
                <div className="mt-3">
                  <div className="mb-3">
                    <label className="form-label">Hints</label>
                    <pre className="result-box">
                      {result.hints || "No hints provided."}
                    </pre>
                  </div>
                  <div className="mb-3">
                    <label className="form-label">Solution</label>
                    <pre className="result-box">
                      {result.solution || "No solution provided."}
                    </pre>
                  </div>
                  <div className="mb-3">
                    <label className="form-label">Example Usage</label>
                    <pre className="result-box">
                      {result.exampleUsage || "No example usage provided."}
                    </pre>
                  </div>
                </div>
              )}
            </div>
          )}

          <hr />
          <h5>Quiz Text Auto-Grader</h5>
          <Grader />
        </div>
      );
    }

    function Grader() {
      const [question, setQuestion] = useState("");
      const [expected, setExpected] = useState("");
      const [student, setStudent] = useState("");
      const [feedback, setFeedback] = useState("");
      const [loading, setLoading] = useState(false);

      const grade = async () => {
        setLoading(true);
        try {
          const r = await postJson("/api/grade-quiz", {
            question,
            expected_answer: expected,
            student_answer: student,
          });
          setFeedback(r.feedback || r.error || "No response");
        } catch (e) {
          setFeedback("Error: " + e.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="mb-2">
            <label className="form-label">Question</label>
            <textarea
              value={question}
              onChange={(e) => setQuestion(e.target.value)}
              className="form-control"
              rows={2}
            />
          </div>
          <div className="mb-2">
            <label className="form-label">Expected Answer</label>
            <textarea
              value={expected}
              onChange={(e) => setExpected(e.target.value)}
              className="form-control"
              rows={3}
            />
          </div>
          <div className="mb-2">
            <label className="form-label">Student Answer</label>
            <textarea
              value={student}
              onChange={(e) => setStudent(e.target.value)}
              className="form-control"
              rows={3}
            />
          </div>
          <button className="btn btn-warning" onClick={grade} disabled={loading}>
            Grade Answer
          </button>
          {loading && <Loader />}
          {feedback && <pre className="result-box mt-3">{feedback}</pre>}
        </div>
      );
    }

    function AnalyticsTab() {
      const [jsonInput, setJsonInput] = useState(`{
  "code_module": "AAA",
  "code_presentation": "2013J",
  "id_student": 123456,
  "gender": "Male",
  "region": "E" ,
  "highest_education": "A Level or Equivalent",
  "imd_band": "0-10",
  "age_band": "20-25",
  "num_of_prev_attempts": 0,
  "studied_credits": 60,
  "disability": "N",
  "final_result": "Pass",
  "registration_day": 1,
  "unregister_day": 0,
  "avg_assessment_score": 65,
  "submitted_assessments": 3,
  "avg_assessment_weight": 50,
  "total_clicks": 120,
  "avg_clicks_per_event": 5,
  "activity_events": 200
}`);
      const [result, setResult] = useState("");
      const [loading, setLoading] = useState(false);

      const predict = async () => {
        let payload;
        try {
          payload = JSON.parse(jsonInput);
        } catch {
          setResult("Invalid JSON format.");
          return;
        }
        setLoading(true);
        try {
          const r = await postJson("/api/risk", payload);
          setResult(JSON.stringify(r, null, 2));
        } catch (e) {
          setResult("Error: " + e.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <p className="text-muted">
            Submit a single student record as JSON to predict risk. You may include
            only the fields you have – missing columns will be filled automatically
            (the model uses the full feature set used during training).
          </p>
          <div className="mb-3">
            <label className="form-label">Student Record JSON</label>
            <textarea
              value={jsonInput}
              onChange={(e) => setJsonInput(e.target.value)}
              className="form-control"
              rows={12}
            />
          </div>
          <button className="btn btn-danger" onClick={predict} disabled={loading}>
            Predict Risk
          </button>
          {loading && <Loader />}
          {result && <pre className="result-box mt-3">{result}</pre>}
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("chat");
      const renderTab = () => {
        switch (activeTab) {
          case "chat":
            return <ChatTab />;
          case "exercise":
            return <ExerciseTab />;
          case "analytics":
            return <AnalyticsTab />;
          default:
            return null;
        }
      };
      return (
        <>
          <h1 className="mb-1">EduMentor AI</h1>
          <p className="text-muted">
            RAG Tutor · Exercise Generator · Student Risk Analytics
          </p>
          <ul className="nav nav-tabs" role="tablist">
            <li className="nav-item" role="presentation">
              <button
                className={`nav-link ${activeTab === "chat" ? "active" : ""}`}
                onClick={() => setActiveTab("chat")}
              >
                Course Chat
              </button>
            </li>
            <li className="nav-item" role="presentation">
              <button
                className={`nav-link ${activeTab === "exercise" ? "active" : ""}`}
                onClick={() => setActiveTab("exercise")}
              >
                Exercise Generator
              </button>
            </li>
            <li className="nav-item" role="presentation">
              <button
                className={`nav-link ${activeTab === "analytics" ? "active" : ""}`}
                onClick={() => setActiveTab("analytics")}
              >
                Analytics Dashboard
              </button>
            </li>
          </ul>
          <div className="tab-content border border-top-0 bg-white p-4 rounded-bottom shadow-sm">
            {renderTab()}
          </div>
        </>
      );
    }

    // helper functions from original script
    function extractSection(text, sectionName, nextSections) {
      const escapedSection = sectionName.replace(/[.*+?^${}()|[\\]\\]/g, "\\$&");
      const escapedNext = nextSections
        .map((name) => name.replace(/[.*+?^${}()|[\\]\\]/g, "\\$&"))
        .join("|");

      const regex = new RegExp(
        `(?:^|\\n)\\s*(?:\\*\\*)?${escapedSection}:(?:\\*\\*)?\\s*([\\s\\S]*?)(?=(?:\\n\\s*(?:\\*\\*)?(?:${escapedNext}):(?:\\*\\*)?)|$)`,
        "i"
      );
      const match = text.match(regex);
      return match ? match[1].trim() : "";
    }

    function normalizeExerciseText(text) {
      return (text || "")
        .replace(/\r\n/g, "\n")
        .replace(/^\s*\*\*(Problem|Example Input|Expected Output|Hints|Solution|Example Usage):\*\*\s*$/gim, "$1:")
        .trim();
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script></body>
</html>
